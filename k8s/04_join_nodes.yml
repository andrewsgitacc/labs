- name: Join Worker Nodes
  hosts: workers
  become: true
  vars:
    join_command_file: "{{ playbook_dir }}/worker_join_command.txt"
    firewall_ports:
      - 10250/tcp
      - 179/tcp
      - 8472/udp   # Flannel VXLAN
      - 30000-32767/tcp  # NodePort services

  tasks:
    - name: Open required firewall ports on workers
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop: "{{ firewall_ports }}"

    - name: Check if node is already joined
      ansible.builtin.stat:
        path: /etc/kubernetes/kubelet.conf
      register: kubelet_conf_check

    - name: Read worker join command from file
      ansible.builtin.set_fact:
        worker_join_command: "{{ lookup('file', join_command_file) }}"
      when: not kubelet_conf_check.stat.exists

    - name: Join worker node to cluster
      ansible.builtin.command: "{{ worker_join_command }}"
      when: not kubelet_conf_check.stat.exists
      changed_when: true
