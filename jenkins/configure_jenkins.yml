---
# Part 1: Clone and power on the Jenkins VM
- import_playbook: provision_jenkins_node.yml

# Part 2: Discover the DHCP IP assigned by VMware Fusion
- hosts: localhost
  gather_facts: false
  connection: local
  become: false
  tasks:
    - name: Intercept DHCP IP for jenkins
      ansible.builtin.command: >
        "/Applications/VMware Fusion.app/Contents/Public/vmrun"
        getGuestIPAddress
        "/Users/andrew/Virtual Machines.localized/jenkins.vmwarevm/jenkins.vmx"
      register: jenkins_ip
      until: jenkins_ip.rc == 0 and jenkins_ip.stdout.strip() != ""
      retries: 30
      delay: 5

    - name: Register jenkins to in-memory inventory
      ansible.builtin.add_host:
        name: "{{ jenkins_ip.stdout.strip() }}"
        groups: jenkins_node
        ansible_user: "admin"
        ansible_ssh_common_args: >-
          -o UserKnownHostsFile=/dev/null
          -o StrictHostKeyChecking=no
          -o PubkeyAuthentication=no
          -o PreferredAuthentications=password

# Part 3: Configure OS, networking, and install Jenkins
- name: Configure Jenkins VM
  hosts: jenkins_node
  become: true
  vars:
    static_ip: "172.16.79.60/24"
    static_gateway: "172.16.79.2"
    dns_server: "172.16.79.10"
    hostname: "jenkins.lab.local"

  tasks:

    # --- Hostname ---

    - name: Set system hostname
      ansible.builtin.hostname:
        name: "{{ hostname }}"

    # --- Baseline packages ---

    - name: Install baseline packages
      ansible.builtin.dnf:
        name:
          - git
          - java-21-openjdk
          - python3-pip
          - fontconfig      # Jenkins UI dependency
        state: present
        update_cache: true

    # --- Ansible + ansible-lint (so Jenkins can run pipelines) ---

    - name: Install ansible-core
      ansible.builtin.dnf:
        name: ansible-core
        state: present

    - name: Install ansible-lint via pip
      ansible.builtin.pip:
        name: ansible-lint
        executable: pip3

    # --- Jenkins repository and package ---

    - name: Download Jenkins LTS repo file
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/redhat-stable/jenkins.repo
        dest: /etc/yum.repos.d/jenkins.repo
        mode: '0644'

    - name: Import Jenkins GPG key
      ansible.builtin.rpm_key:
        key: https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
        state: present

    - name: Install Jenkins LTS
      ansible.builtin.dnf:
        name: jenkins
        state: present
        update_cache: true

    # --- Firewall ---

    - name: Open port 8080 for Jenkins UI
      ansible.posix.firewalld:
        port: 8080/tcp
        permanent: true
        state: enabled
        immediate: true

    # --- Service ---

    - name: Enable and start Jenkins service
      ansible.builtin.systemd_service:
        name: jenkins
        state: started
        enabled: true

    # --- Networking (last — connection drops when IP changes) ---

    - name: Set static IP via NetworkManager
      community.general.nmcli:
        conn_name: "ens160"
        ifname: "ens160"
        type: ethernet
        ip4: "{{ static_ip }}"
        gw4: "{{ static_gateway }}"
        dns4: "{{ dns_server }}"
        state: present

    - name: Apply static IP (connection drops — this is expected)
      ansible.builtin.shell: "sleep 2 && nmcli connection up ens160"
      async: 10
      poll: 0

    - name: Print Jenkins unlock instructions
      ansible.builtin.debug:
        msg:
          - "Jenkins is running at http://{{ static_ip | regex_replace('/.*', '') }}:8080"
          - "Unlock key: sudo cat /var/lib/jenkins/secrets/initialAdminPassword"
